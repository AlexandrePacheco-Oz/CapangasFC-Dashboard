<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard - Controle de Mensalidade</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #040811;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #0056b3;
            --primary-light: #007bff;
            --accent: #d4af37;
            --success: #00ff88;
            --danger: #ff4d4d;
            --text-main: #f0f0f0;
            --text-dim: #a0a0a0;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #0a1931, #040811);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            padding-top: max(40px, env(safe-area-inset-top));
            padding-bottom: max(40px, env(safe-area-inset-bottom));
            overflow-x: hidden;
            position: relative;
        }

        /* --- Logo Watermark --- */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vh;
            height: 80vh;
            background: url('imagem/LogoPng.png') no-repeat center;
            background-size: contain;
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .container {
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 1;
            padding: 0 5px;
        }
        
        /* Optimization for high resolution (S24, etc) */
        @media screen and (min-resolution: 2dppx) {
            body { -webkit-font-smoothing: antialiased; }
        }

        /* --- Header Section --- */
        .header {
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-header {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(0, 86, 179, 0.4));
        }

        .qr-code {
            width: 140px;
            height: 140px;
            margin-bottom: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .pix-badge {
            display: inline-block;
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--accent);
            border-radius: 50px;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .pix-badge span {
            color: var(--accent);
            font-weight: 700;
        }

        /* --- Stats Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-left-color: var(--accent);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .stat-value.total {
            color: var(--accent);
        }

        .stat-value.paid {
            color: var(--success);
        }

        .stat-value.pending {
            color: var(--danger);
        }

        /* --- Search & Controls --- */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-container {
            flex: 1;
            min-width: 200px;
        }

        #searchInput {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 18px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .login-section {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--glass-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .login-section input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 6px 10px;
            color: #fff;
            width: 80px;
            font-size: 0.8rem;
        }

        .btn-login {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 0.8rem;
        }

        .btn-login:hover {
            transform: scale(1.05);
        }

        /* --- Table Styling --- */
        .table-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow-x: auto;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 450px;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        tr:hover {
            background: rgba(0, 86, 179, 0.05);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge.pago {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
        }

        .badge.pendente {
            background: rgba(255, 77, 77, 0.1);
            color: var(--danger);
        }

        .action-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            min-width: 90px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .action-btn:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .action-btn.btn-delete {
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn.btn-delete:hover:not(:disabled) {
            background: var(--danger);
            color: #fff;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- Modal Styling --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--accent);
            border-radius: 24px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            position: relative;
            text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .modal-qr {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .close-modal:hover {
            opacity: 1;
        }

        .btn-view-qr {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-left: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            vertical-align: middle;
        }

        .btn-view-qr:hover {
            background: var(--accent);
            color: #000;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            pointer-events: none;
        }

        .toast.active {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 1024px) {
            body { padding: 15px 10px; }
            .header { margin-bottom: 15px; }
            .header h1 { font-size: 1.4rem; margin-bottom: 4px; }
            .header p { font-size: 0.85rem; margin-bottom: 10px; }
            .logo-header { width: 60px; height: 60px; margin-bottom: 8px; }
            .controls { flex-direction: column; gap: 8px; margin-bottom: 15px; }
            .login-section { width: 100%; justify-content: space-between; gap: 5px; padding: 6px; }
            .login-section input { width: 100%; height: 32px; font-size: 0.75rem; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
            .stat-card { padding: 8px 5px; border-radius: 12px; }
            .stat-label { font-size: 0.6rem; letter-spacing: 0.5px; }
            .stat-value { font-size: 0.95rem; }
            .qr-code { width: 100px; height: 100px; }
            .btn-view-qr { display: block; margin: 8px auto 0 auto; width: fit-content; font-size: 0.65rem; }
            .pix-badge { padding: 6px 12px; font-size: 0.75rem; }

            /* Table to Cards */
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            .table-container { background: none; border: none; box-shadow: none; overflow: visible; }
            tr {
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                margin-bottom: 8px;
                padding: 10px 12px;
                backdrop-filter: blur(10px);
                position: relative;
            }
            td {
                border-bottom: none;
                padding: 6px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                min-height: 38px;
            }
            td:before {
                content: attr(data-label);
                font-size: 0.65rem;
                text-transform: uppercase;
                color: var(--accent);
                font-weight: 700;
            }
            td:first-child { font-size: 1rem; border-bottom: 1px solid var(--glass-border); margin-bottom: 6px; padding-bottom: 8px; font-weight: 700; }
            td:first-child:before { display: none; }
            
            .action-btn {
                flex: 1;
                width: 100%;
                height: 32px;
                font-size: 0.7rem;
                min-width: 0;
            }
        }
    </style>
</head>

<body>

    <div class="watermark"></div>

    <!-- Modal QR Code -->
    <div id="qrModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: var(--accent);">Escaneie o PIX</h2>
            <img src="imagem/qr code.png" alt="QR Code Grande" class="modal-qr">
            <p style="font-size: 0.9rem; color: var(--text-dim);">Capangas Futebol Clube</p>
            <button class="btn-login" style="margin-top: 20px; width: 100%;" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <div id="pixToast" class="toast">✅ Chave PIX copiada!</div>

    <div class="container">
        <div class="header">
            <img src="imagem/LogoPng.png" alt="Logo" class="logo-header" onerror="this.style.display='none'">
            <h1>Controle de Mensalidade</h1>
            <p>Capangas Futebol Clube</p>


            <div class="pix-badge" onclick="copyPIX()" style="cursor: pointer;" title="Clique para copiar a chave PIX">
                Chave PIX: <span id="pixKey">11985112723</span>
                <button class="btn-view-qr" onclick="event.stopPropagation(); openModal()">AMPLIAR QR CODE</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Arrecadado</div>
                <div class="stat-value total" id="statArrecadado">R$ 0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pagos</div>
                <div class="stat-value paid" id="statPagos">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pendentes</div>
                <div class="stat-value pending" id="statPendentes">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar por nome..." oninput="render()">
            </div>

            <div class="login-section" id="loginBox">
                <input type="text" id="user" placeholder="Usuário">
                <input type="password" id="pass" placeholder="Senha">
                <button class="btn-login" onclick="login()">Entrar</button>
            </div>
        </div>
        <div id="statusLogin"
            style="text-align: right; padding-right: 10px; margin-bottom: 10px; font-size: 0.8rem; font-weight: 600;">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>

    <script>
        let adminLogado = false;

        function openModal() {
            document.getElementById("qrModal").classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById("qrModal").classList.remove("active");
            document.body.style.overflow = "auto";
        }

        let pessoas = [
            { nome: "Caiado", pago: false },
            { nome: "Silva", pago: true },
            { nome: "Apoli", pago: false },
            { nome: "Riba", pago: true },
            { nome: "Pacheco", pago: false },
            { nome: "Hellian", pago: false },
            { nome: "Caio Freitas", pago: false },
            { nome: "Caio", pago: true },
            { nome: "Iguinho", pago: false },
            { nome: "Gui", pago: true },
            { nome: "Japa", pago: false },
            { nome: "Andrey", pago: true },
            { nome: "Alef", pago: false },
            { nome: "Léo", pago: false },
            { nome: "Ni", pago: false },
            { nome: "Cadu", pago: true },
            { nome: "Fabrício", pago: false },
            { nome: "Vitera", pago: false },
            { nome: "Ramos", pago: false },
            { nome: "Jé", pago: false },
            { nome: "Kami", pago: false },
            { nome: "Sejamos", pago: false },
            { nome: "Hailton", pago: false }
        ];

        function salvar() {
            localStorage.setItem("mensalidade", JSON.stringify(pessoas));
        }

        function carregar() {
            let dados = localStorage.getItem("mensalidade");
            if (dados) {
                pessoas = JSON.parse(dados);
            }
        }

        async function getHash(string) {
            const msgUint8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login() {
            let u = document.getElementById("user").value;
            let p = document.getElementById("pass").value;

            // Hash correspondente à senha "cap@2026"
            const adminHash = "0e5ccfea776065049f53aa0538aa4f922cf57d14db1bc87060dd356ef4c750cd";
            const userHash = await getHash(p);

            if (u === "admin" && userHash === adminHash) {
                adminLogado = true;
                showAdminUI();
            } else {
                document.getElementById("statusLogin").innerHTML = "<span style='color: var(--danger)'>❌ Login inválido</span>";
            }

            render();
        }

        function showAdminUI() {
            document.getElementById("statusLogin").innerHTML = `
                <div style="display: flex; gap: 10px; align-items: center; justify-content: flex-end; flex-wrap: wrap;">
                    <span style='color: var(--success); font-size: 0.8rem;'>✅ Modo Admin Ativado</span>
                    <button class="action-btn" style="background: var(--success); color: #000; font-weight: 700;" onclick="manualSave()">💾 Salvar</button>
                    <button class="action-btn" style="background: var(--danger); color: #fff; font-weight: 700;" onclick="logout()">🏃 Sair</button>
                </div>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <input type="text" id="novoJogador" placeholder="Nome do novo jogador..." style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--accent); border-radius: 10px; padding: 10px; color: #fff;">
                    <button class="action-btn" style="background: var(--accent); color: #000; font-weight: 700;" onclick="adicionarPessoa()">➕ Adicionar</button>
                </div>
            `;
            document.getElementById("loginBox").style.display = "none";
        }

        function adicionarPessoa() {
            const input = document.getElementById("novoJogador");
            const nome = input.value.trim();
            if (!nome) return;
            
            pessoas.push({ nome: nome, pago: false });
            input.value = "";
            salvar();
            render();
            
            // Feedback
            const toast = document.getElementById("pixToast");
            const originalText = toast.innerText;
            toast.innerText = "👤 Jogador adicionado!";
            toast.classList.add("active");
            setTimeout(() => {
                toast.classList.remove("active");
                setTimeout(() => { toast.innerText = originalText; }, 300);
            }, 2000);
        }

        function logout() {
            adminLogado = false;
            document.getElementById("statusLogin").innerHTML = "";
            document.getElementById("loginBox").style.display = "flex";
            document.getElementById("user").value = "";
            document.getElementById("pass").value = "";
            render();
        }

        function manualSave() {
            salvar();
            const toast = document.getElementById("pixToast");
            const originalText = toast.innerText;
            toast.innerText = "💾 Alterações salvas!";
            toast.classList.add("active");
            setTimeout(() => {
                toast.classList.remove("active");
                setTimeout(() => { toast.innerText = originalText; }, 300);
            }, 2000);
        }

        function removerPessoa(index) {
            if (confirm(`Remover "${pessoas[index].nome}" da lista?`)) {
                pessoas.splice(index, 1);
                salvar();
                render();
            }
        }

        function copyPIX() {
            const pixKey = document.getElementById("pixKey").innerText;
            navigator.clipboard.writeText(pixKey).then(() => {
                const toast = document.getElementById("pixToast");
                toast.classList.add("active");
                setTimeout(() => {
                    toast.classList.remove("active");
                }, 2000);
            });
        }

        function render() {
            let search = document.getElementById("searchInput").value.toLowerCase();
            let lista = document.getElementById("lista");
            lista.innerHTML = "";

            let paidCount = 0;
            let totalArrecadado = 0;

            pessoas.forEach((p, i) => {
                if (p.pago) {
                    paidCount++;
                    totalArrecadado += 20;
                }

                if (p.nome.toLowerCase().includes(search)) {
                    lista.innerHTML += `
                        <tr>
                            <td style="font-weight: 500;">${p.nome}</td>
                            <td data-label="Status">
                                <span class="badge ${p.pago ? 'pago' : 'pendente'}">
                                    ${p.pago ? '● PAGO' : '● PENDENTE'}
                                </span>
                            </td>
                            <td data-label="Ação">
                                <div style="display: flex; gap: 5px; align-items: center;">
                                    <button class="action-btn" onclick="toggle(${i})" ${!adminLogado ? 'disabled' : ''}>
                                        ${p.pago ? 'Desfazer' : 'Marcar'}
                                    </button>
                                    ${adminLogado ? `
                                        <button class="action-btn btn-delete" onclick="removerPessoa(${i})">
                                            Excluir
                                        </button>
                                    ` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                }
            });

            // Update Stats
            document.getElementById("statArrecadado").innerText = "R$ " + totalArrecadado;
            document.getElementById("statPagos").innerText = paidCount;
            document.getElementById("statPendentes").innerText = pessoas.length - paidCount;
        }

        function toggle(i) {
            if (!adminLogado) return;
            pessoas[i].pago = !pessoas[i].pago;
            salvar();
            render();
        }

        carregar();
        render();
    </script>

</body>

</html>
